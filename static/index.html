<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal Transfer Plan | De Anza to UC Berkeley</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-dark: #07090f;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --berkeley-blue: #003262;
    --berkeley-gold: #fdb515;
    
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.06);
    --glass-highlight: rgba(255, 255, 255, 0.1);
    
    --heatmap-low: #10b981;
    --heatmap-med: #f59e0b;
    --heatmap-high: #ef4444;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding: 2rem;
}

/* Atmospheric glowing orbs */
.glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.5;
    animation: float 20s infinite alternate ease-in-out;
}

.orb-1 {
    top: -10%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,50,98,0.8) 0%, rgba(0,0,0,0) 70%);
}

.orb-2 {
    bottom: -20%;
    right: -10%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(253,181,21,0.2) 0%, rgba(0,0,0,0) 70%);
    animation-delay: -10s;
}

@keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(50px, 50px) scale(1.1); }
}

.dashboard {
    max-width: 1400px;
    margin: 0 auto;
}

.header {
    text-align: center;
    margin-bottom: 4rem;
    display: flex;
    justify-content: center;
}

.header-content {
    max-width: 700px;
}

.badge {
    display: inline-block;
    padding: 0.5rem 1rem;
    background: rgba(253, 181, 21, 0.15);
    color: var(--berkeley-gold);
    border: 1px solid rgba(253, 181, 21, 0.3);
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1.5rem;
}

h1 {
    font-size: 3.5rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    font-size: 1.1rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 2.5rem;
}

.primary-btn {
    position: relative;
    background: linear-gradient(135deg, var(--berkeley-blue), #004a93);
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 1rem 2.5rem;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px -5px rgba(0, 50, 98, 0.5);
}

.primary-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px -5px rgba(0, 50, 98, 0.7);
    border-color: rgba(255, 255, 255, 0.3);
}

.primary-btn:active {
    transform: translateY(1px);
}

.hidden {
    display: none !important;
}

.plan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    animation: fadeIn 0.8s ease-out forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.quarter-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease, background 0.3s ease;
}

.quarter-card:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--glass-highlight);
}

.quarter-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--glass-border);
}

.term-title {
    font-size: 1.8rem;
    font-weight: 600;
    color: #fff;
}

.unit-counter {
    font-size: 0.9rem;
    color: var(--text-secondary);
    background: rgba(0,0,0,0.3);
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    border: 1px solid var(--glass-border);
}

.unit-counter.warn {
    color: var(--heatmap-high);
    border-color: rgba(239, 68, 68, 0.3);
}

.course-list {
    list-style: none;
    flex-grow: 1;
}

.course-item {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    transition: all 0.2s ease;
}

.course-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255,255,255,0.1);
}

.course-id {
    font-weight: 700;
    color: var(--berkeley-gold);
    display: block;
    margin-bottom: 0.25rem;
    font-size: 1.1rem;
}

.course-name {
    color: var(--text-primary);
    font-size: 0.9rem;
    opacity: 0.9;
    margin-bottom: 0.5rem;
}

.course-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.heatmap-container {
    margin-top: 2rem;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 1rem;
    border: 1px solid var(--glass-border);
}

.heatmap-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-secondary);
}

.heatmap-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}

.heatmap-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (max-width: 768px) {
    h1 { font-size: 2.5rem; }
    .plan-grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    
    <main class="dashboard">
        <header class="header">
            <div class="header-content">
                <div class="badge">B.S. Chemical Engineering Pathway</div>
                <h1>Optimal 1-Year Transfer Plan</h1>
                <p>Transferring from <b>De Anza College</b> to <b>UC Berkeley</b>. This highly optimized plan balances intense STEM sequences with lower-difficulty GEs to maximize your transfer GPA safety.</p>
                
                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">Generate Academic Plan</span>
                    <span class="btn-glow"></span>
                </button>
            </div>
        </header>

        <section id="planContainer" class="plan-grid hidden">
            <!-- Quarters will be injected here via JavaScript -->
        </section>
    </main>

    <script>
document.getElementById('generateBtn').addEventListener('click', async () => {
    const btn = document.getElementById('generateBtn');
    const container = document.getElementById('planContainer');
    
    // Add loading state
    btn.innerHTML = `<span class="btn-text">Calculating Optimization...</span>`;
    btn.style.opacity = '0.8';
    btn.disabled = true;

    try {
        const response = await fetch('/api/plan');
        const data = await response.json();
        
        // Clear previous and show container
        container.innerHTML = '';
        container.classList.remove('hidden');

        // Build UI
        data.plan.forEach((quarter, index) => {
            const delay = index * 0.15; // Staggered animation
            
            // Calculate absolute max difficulty safely (assuming roughly 40 is extreme)
            const maxDiff = 40; 
            const diffPercentage = Math.min((quarter.difficulty_score / maxDiff) * 100, 100);
            
            // Heatmap color logic
            let heatmapColor = 'var(--heatmap-low)';
            let diffLabel = 'Manageable';
            if (quarter.difficulty_score > 25) {
                heatmapColor = 'var(--heatmap-med)';
                diffLabel = 'Intense';
            }
            if (quarter.difficulty_score >= 32) {
                heatmapColor = 'var(--heatmap-high)';
                diffLabel = 'Extreme / Weeder Focus';
            }

            const isWarning = quarter.total_units > quarter.max_units;

            const card = document.createElement('div');
            card.className = 'quarter-card';
            card.style.animationDelay = `${delay}s`;
            
            card.innerHTML = `
                <div class="quarter-header">
                    <h2 class="term-title">${quarter.term}</h2>
                    <div class="unit-counter ${isWarning ? 'warn' : ''}">
                        ${quarter.total_units} / ${quarter.max_units} Units
                    </div>
                </div>
                
                <ul class="course-list">
                    ${quarter.courses.map(course => `
                        <li class="course-item">
                            <span class="course-id">${course.id}</span>
                            <div class="course-name">${course.name}</div>
                            <div class="course-meta">
                                <span>${course.units} Units</span>
                                <span>Diff: ${course.difficulty}/10</span>
                            </div>
                        </li>
                    `).join('')}
                </ul>
                
                <div class="heatmap-container">
                    <div class="heatmap-label">
                        <span>Difficulty Heatmap</span>
                        <span style="color: ${heatmapColor}">${diffLabel}</span>
                    </div>
                    <div class="heatmap-bar">
                        <div class="heatmap-fill" style="width: 0%; background: ${heatmapColor}; box-shadow: 0 0 10px ${heatmapColor}"></div>
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            
            // Trigger animation for heatmap fill shortly after DOM insertion
            setTimeout(() => {
                const fill = card.querySelector('.heatmap-fill');
                if (fill) fill.style.width = `${diffPercentage}%`;
            }, 50 + (index * 150));
        });
        
    } catch (error) {
        console.error('Error fetching plan:', error);
        container.innerHTML = `<p style="color: red; text-align: center; width: 100%;">Failed to load the optimal plan. Ensure backend is running.</p>`;
        container.classList.remove('hidden');
    } finally {
        btn.innerHTML = `<span class="btn-text">Regenerate Plan</span><span class="btn-glow"></span>`;
        btn.style.opacity = '1';
        btn.disabled = false;
    }
});

</script>
</body>
</html>
